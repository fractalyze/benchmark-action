name: "ZK Benchmark"
description: "Run benchmarks, detect regressions, and report results"
author: "Fractalyze"

branding:
  icon: "activity"
  color: "blue"

inputs:
  benchmark_cmd:
    description: "Command to run the benchmark (must output JSON to benchmark_results.json)"
    required: true
  device:
    description: "Device type (cpu or gpu)"
    required: true
  regression_threshold:
    description: "Percentage threshold fallback when stdev is unavailable (e.g., 0.10 for 10%)"
    required: false
    default: "0.10"
  zscore_threshold:
    description: "Z-score threshold for regression detection (e.g., 3.0)"
    required: false
    default: "3.0"
  baseline_path:
    description: "Path to baseline JSON file for regression detection"
    required: false
    default: "benchmark_data/baseline.json"
  results_file:
    description: "Path to output benchmark results JSON"
    required: false
    default: "benchmark_results.json"
  slack_webhook:
    description: "Slack webhook URL for regression alerts (fallback if no bot token)"
    required: false
    default: ""
  slack_bot_token:
    description: "Slack Bot Token (xoxb-...) for thread replies. Preferred over slack_webhook."
    required: false
    default: ""
  slack_channel_id:
    description: "Slack channel ID for bot messages (e.g., C0123456789)"
    required: false
    default: ""
  store_results:
    description: "Whether to store results (true on main branch)"
    required: false
    default: "false"
  results_dir:
    description: "Directory to store historical results"
    required: false
    default: "benchmark_data"
  cpu_load_threshold:
    description: "CPU load threshold (0-1) above which to emit warning"
    required: false
    default: "0.80"
  memory_threshold:
    description: "Memory usage threshold (0-1) above which to emit warning"
    required: false
    default: "0.80"
  isolation_cpuset:
    description: "Docker --cpuset-cpus value if running in container (e.g., 0-15)"
    required: false
    default: ""
  isolation_memory_gb:
    description: "Docker --memory value in GB if running in container (e.g., 32)"
    required: false
    default: ""
  isolation_gpu:
    description: "Docker --gpus value if running in container (e.g., all)"
    required: false
    default: ""
  isolation_network:
    description: "Docker --network value if running in container (e.g., host)"
    required: false
    default: ""
  isolation_image:
    description: "Docker image used for isolation (e.g., ghcr.io/fractalyze/benchmark-runner:latest)"
    required: false
    default: ""
  rolling_window:
    description: "Number of historical results to average for baseline"
    required: false
    default: "10"
  anthropic_api_key:
    description: "Anthropic API key for Claude AI analysis"
    required: false
    default: ""
  ai_model:
    description: "Claude model to use for analysis"
    required: false
    default: "claude-opus-4-5-20251101"
  dashboard_token:
    description: "GitHub token for triggering dashboard updates"
    required: false
    default: ""
  dashboard_repo:
    description: "Dashboard repository (owner/repo)"
    required: false
    default: "fractalyze/benchmark-dashboard"
  repo:
    description: "Source repository name for commit links (e.g., zkx). Defaults to GITHUB_REPOSITORY tail."
    required: false
    default: ""

outputs:
  has_significant_change:
    description: "Whether a significant change (regression or improvement) was detected"
    value: ${{ steps.regression.outputs.has_significant_change }}
  change_type:
    description: "Type of change detected (regression, improvement, mixed, or empty)"
    value: ${{ steps.regression.outputs.change_type }}
  results_file:
    description: "Path to benchmark results JSON"
    value: ${{ inputs.results_file }}
  cpu_load:
    description: "Normalized CPU load (0-1)"
    value: ${{ steps.system_load.outputs.cpu_load }}
  memory_usage:
    description: "Memory usage ratio (0-1)"
    value: ${{ steps.system_load.outputs.memory_usage }}

runs:
  using: "composite"
  steps:
    - name: Check system load
      id: system_load
      shell: bash
      env:
        CPU_LOAD_THRESHOLD: ${{ inputs.cpu_load_threshold }}
        MEMORY_THRESHOLD: ${{ inputs.memory_threshold }}
        SYSTEM_LOAD_OUTPUT: system_load.json
        ISOLATION_CPUSET: ${{ inputs.isolation_cpuset }}
        ISOLATION_MEMORY_GB: ${{ inputs.isolation_memory_gb }}
        ISOLATION_GPU: ${{ inputs.isolation_gpu }}
        ISOLATION_NETWORK: ${{ inputs.isolation_network }}
        ISOLATION_IMAGE: ${{ inputs.isolation_image }}
      run: python3 ${{ github.action_path }}/scripts/check_system_load.py

    - name: Run benchmark
      shell: bash
      run: ${{ inputs.benchmark_cmd }}

    - name: Verify test vectors
      shell: bash
      run: |
        python3 ${{ github.action_path }}/scripts/verify_test_vectors.py \
          --results="${{ inputs.results_file }}"

    - name: Detect regression
      id: regression
      shell: bash
      env:
        REGRESSION_THRESHOLD: ${{ inputs.regression_threshold }}
        ZSCORE_THRESHOLD: ${{ inputs.zscore_threshold }}
        BASELINE_PATH: ${{ inputs.baseline_path }}
        RESULTS_FILE: ${{ inputs.results_file }}
        REGRESSION_DETAILS_FILE: regression_details.json
      run: |
        python3 ${{ github.action_path }}/scripts/detect_regression.py

    - name: AI performance analysis
      if: inputs.anthropic_api_key != ''
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        AI_MODEL: ${{ inputs.ai_model }}
        RESULTS_FILE: ${{ inputs.results_file }}
        REGRESSION_DETAILS_FILE: regression_details.json
        SYSTEM_LOAD_OUTPUT: system_load.json
        AI_ANALYSIS_OUTPUT: ai_analysis.md
      run: python3 ${{ github.action_path }}/scripts/ai_analysis.py >> $GITHUB_STEP_SUMMARY

    - name: Store results
      if: inputs.store_results == 'true'
      shell: bash
      env:
        RESULTS_DIR: ${{ inputs.results_dir }}
        RESULTS_FILE: ${{ inputs.results_file }}
        ROLLING_WINDOW: ${{ inputs.rolling_window }}
      run: |
        mkdir -p "$RESULTS_DIR"
        TIMESTAMP=$(date -u +%Y%m%dT%H%M%S)
        cp "$RESULTS_FILE" "$RESULTS_DIR/${TIMESTAMP}.json"
        python3 ${{ github.action_path }}/scripts/calculate_rolling_baseline.py

    - name: Push results to dashboard
      if: inputs.store_results == 'true' && inputs.dashboard_token != ''
      shell: bash
      env:
        DASHBOARD_TOKEN: ${{ inputs.dashboard_token }}
        DASHBOARD_REPO: ${{ inputs.dashboard_repo }}
        DEVICE: ${{ inputs.device }}
        RESULTS_FILE: ${{ inputs.results_file }}
        SOURCE_REPO: ${{ inputs.repo }}
      run: python3 ${{ github.action_path }}/scripts/push_to_dashboard.py

    - name: Send Slack alert
      if: github.event_name == 'push' && (failure() || cancelled() || steps.regression.outputs.has_significant_change == 'true')
      shell: bash
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook }}
        SLACK_BOT_TOKEN: ${{ inputs.slack_bot_token }}
        SLACK_CHANNEL_ID: ${{ inputs.slack_channel_id }}
        RESULTS_FILE: ${{ inputs.results_file }}
        SOURCE_REPO: ${{ inputs.repo }}
        DEVICE: ${{ inputs.device }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        AI_ANALYSIS_OUTPUT: ai_analysis.md
        CHANGE_TYPE: ${{ steps.regression.outputs.change_type }}
        REGRESSION_DETAILS_FILE: regression_details.json
        DASHBOARD_TOKEN: ${{ inputs.dashboard_token }}
        DASHBOARD_REPO: ${{ inputs.dashboard_repo }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        if [ -n "$SLACK_BOT_TOKEN" ] || [ -n "$SLACK_WEBHOOK_URL" ]; then
          python3 ${{ github.action_path }}/scripts/send_slack_alert.py
        else
          echo "No Slack credentials set, skipping alert"
        fi

    - name: Post summary
      shell: bash
      env:
        RESULTS_FILE: ${{ inputs.results_file }}
        SYSTEM_LOAD_OUTPUT: system_load.json
        REGRESSION_DETAILS_FILE: regression_details.json
        BASELINE_PATH: ${{ inputs.baseline_path }}
      run: |
        python3 ${{ github.action_path }}/scripts/post_summary.py >> $GITHUB_STEP_SUMMARY

    - name: Trigger dashboard update
      if: inputs.store_results == 'true' && inputs.dashboard_token != ''
      shell: bash
      env:
        DASHBOARD_TOKEN: ${{ inputs.dashboard_token }}
        DASHBOARD_REPO: ${{ inputs.dashboard_repo }}
        SOURCE_REPO: ${{ inputs.repo }}
        DEVICE: ${{ inputs.device }}
      run: |
        curl -s -X POST \
          -H "Authorization: token $DASHBOARD_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$DASHBOARD_REPO/dispatches" \
          -d "{\"event_type\":\"deploy-pages\",\"client_payload\":{\"repo\":\"$SOURCE_REPO\",\"device\":\"$DEVICE\"}}"
        echo "Triggered dashboard update for $SOURCE_REPO ($DEVICE)"
